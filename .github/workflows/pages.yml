name: Deploy static site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Stamp asset cache version
        shell: bash
        run: |
          grep -rlZ --include='*.html' --include='*.js' '__BUILD_VERSION__' . \
            | xargs -0 -r sed -i "s/__BUILD_VERSION__/${GITHUB_SHA}/g"
          sed -i "s/__DISPLAY_VERSION__/${GITHUB_SHA::8}/g" index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
